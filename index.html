<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENCHI 玄智 — 易占い 六爻判断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=Cormorant+Garamond:wght@300;400;600&family=Shippori+Mincho:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --void: #03040a;
  --card: #0c0e1a;
  --gold: #d4aa50;
  --gold-light: #f5d878;
  --gold-dim: #8a6e30;
  --silver: #b0c0e0;
  --silver-dark: #4060a0;
  --text: #f0f4ff;
  --muted: #7080b0;
  --changing: #d04040;
}

body {
  background: var(--void);
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== 波紋キャンバス ===== */
#waveCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ===== ラッパー ===== */
.wrapper {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px 80px;
}

/* ===== ヘッダー ===== */
header {
  text-align: center;
  padding: 44px 0 28px;
}
.taiji {
  font-size: 56px;
  line-height: 1;
  margin-bottom: 14px;
  animation: spin 24s linear infinite;
  display: inline-block;
  filter: drop-shadow(0 0 16px rgba(212,170,80,0.5));
}
@keyframes spin { to { transform: rotate(360deg); } }
.hd-en {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  font-weight: 300;
  letter-spacing: 0.45em;
  color: var(--gold-light);
  margin-bottom: 6px;
}
.hd-jp {
  font-family: 'Shippori Mincho', serif;
  font-size: 12px;
  letter-spacing: 0.5em;
  color: var(--gold-dim);
  margin-bottom: 12px;
}
.hd-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  font-size: 9px;
  letter-spacing: 0.5em;
  color: var(--gold-dim);
}
.hd-line::before,.hd-line::after {
  content:''; width:56px; height:1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim));
}
.hd-line::after { background: linear-gradient(90deg, var(--gold-dim), transparent); }

/* ===== コンテナ ===== */
.container { width:100%; max-width:520px; }

/* ===== カード共通 ===== */
.card {
  background: rgba(12,14,26,0.85);
  border: 1px solid rgba(212,170,80,0.22);
  backdrop-filter: blur(8px);
  position: relative;
  overflow: hidden;
  margin-bottom: 14px;
}
.card::before {
  content:'';
  position: absolute;
  top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.5;
}

/* ===== 問いセクション ===== */
.q-section { padding: 18px 20px; }
.sec-label {
  font-size: 9px;
  letter-spacing: 0.5em;
  color: #b09050;
  margin-bottom: 10px;
}
.q-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,170,80,0.18);
  color: #ffffff;
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  resize: none;
  height: 54px;
  line-height: 1.7;
}
.q-input::placeholder { color: #4050a0; font-size: 11px; }

/* ===== 進捗バー ===== */
.prog-bar { height: 1px; background: rgba(212,170,80,0.12); margin-bottom: 14px; }
.prog-fill { height:100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); transition: width 0.5s ease; }

/* ===== 爻セクション ===== */
.yao-section { padding: 22px 20px; }
.yao-title {
  font-size: 10px;
  letter-spacing: 0.4em;
  color: #d0b060;
  text-align: center;
  margin-bottom: 18px;
}

/* 爻表示 */
.yao-display {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 22px;
  min-height: 130px;
}

.yao-row {
  display: flex;
  align-items: center;
  height: 24px;
  animation: yaoIn 0.35s ease both;
}
@keyframes yaoIn {
  from { opacity:0; transform:translateX(-6px); }
  to { opacity:1; transform:translateX(0); }
}

.yr-num {
  width: 30px;
  text-align: right;
  font-size: 10px;
  color: #6070a0;
  flex-shrink: 0;
  letter-spacing: 0.05em;
}

.yr-lines {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0 10px;
  height: 24px;
}

/* 陽爻：金色の一本線 */
.bar-yang {
  height: 12px;
  width: 100%;
  border-radius: 1px;
  background: linear-gradient(90deg, #8a6020, #e8c040, #f5d870, #e8c040, #8a6020);
  box-shadow: 0 0 6px rgba(212,170,80,0.4);
}

/* 陰爻：銀色の二本線 */
.bar-yin {
  height: 12px;
  width: 44%;
  border-radius: 1px;
  background: linear-gradient(90deg, #283560, #7090c8, #a8c0e8, #7090c8, #283560);
  box-shadow: 0 0 4px rgba(112,144,200,0.3);
}

/* 変爻：赤 */
.bar-changing-yang {
  height: 12px;
  width: 100%;
  border-radius: 1px;
  background: linear-gradient(90deg, #601010, #d03030, #ff5050, #d03030, #601010);
  box-shadow: 0 0 6px rgba(200,50,50,0.4);
}
.bar-changing-yin {
  height: 12px;
  width: 44%;
  border-radius: 1px;
  background: linear-gradient(90deg, #601010, #c02828, #e03838, #c02828, #601010);
  box-shadow: 0 0 4px rgba(200,50,50,0.3);
  opacity: 0.85;
}

.yr-val {
  width: 22px;
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  color: #5060a0;
  flex-shrink: 0;
}
.yr-type {
  width: 52px;
  text-align: right;
  font-size: 10px;
  flex-shrink: 0;
  letter-spacing: 0.05em;
}
.yr-type.yang { color: var(--gold); }
.yr-type.yin { color: var(--silver); }
.yr-type.changing { color: var(--changing); }

/* ===== 占断ボタン ===== */
.coin-btn {
  width: 100%;
  background: transparent;
  border: 1.5px solid var(--gold-dim);
  color: var(--gold-light);
  font-family: 'Shippori Mincho', serif;
  font-size: 14px;
  letter-spacing: 0.3em;
  padding: 16px;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: relative;
}
.coin-btn:hover { background: rgba(212,170,80,0.08); border-color: var(--gold); }
.coin-btn:active { transform: scale(0.99); }
.coin-btn.disabled { opacity: 0.3; pointer-events: none; }
.coin-btn.complete { border-color: var(--gold); }
.count-badge { position:absolute; right:16px; font-size:11px; color:var(--muted); }

/* ===== 結果セクション ===== */
.result-wrap { display:none; }
.result-wrap.show { display:block; animation: fadeUp 0.9s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

.oracle-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px;
  letter-spacing: 0.5em;
  color: var(--gold-dim);
  padding: 28px 0 18px;
}
.oracle-label::before,.oracle-label::after {
  content:''; width:64px; height:1px;
  background: var(--gold-dim); opacity:0.5;
}

/* 卦メイン表示 */
.hex-main-card { padding: 28px 20px 24px; }

/* 本卦と之卦を横並び・中央揃え */
.hex-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.hex-block {
  text-align: center;
  flex: 1;
  max-width: 180px;
}

.hex-arrow {
  font-size: 20px;
  color: var(--gold-dim);
  flex-shrink: 0;
  opacity: 0.7;
  align-self: center;
}

/* 卦の爻線（結果用）*/
.res-lines {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin: 0 auto 14px;
  width: 100px;
}
.res-line {
  display: flex;
  gap: 6px;
  height: 10px;
  align-items: center;
  justify-content: center;
}
.res-bar-yang {
  height: 10px;
  width: 100px;
  border-radius: 1px;
  background: linear-gradient(90deg, #8a6020, #e8c040, #f5d870, #e8c040, #8a6020);
  box-shadow: 0 0 5px rgba(212,170,80,0.35);
}
.res-bar-yin {
  height: 10px;
  width: 43px;
  border-radius: 1px;
  background: linear-gradient(90deg, #283560, #7090c8, #a8c0e8, #7090c8, #283560);
  box-shadow: 0 0 3px rgba(112,144,200,0.25);
}

/* 卦の漢字 */
.hex-kanji {
  font-family: 'Shippori Mincho', serif;
  font-size: 54px;
  font-weight: 800;
  color: var(--gold-light);
  line-height: 1;
  margin-bottom: 8px;
  text-shadow: 0 0 24px rgba(212,170,80,0.4);
}
.hex-kanji.zhi { font-size: 40px; color: #c0a050; }

.hex-name {
  font-family: 'Shippori Mincho', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 3px;
}
.hex-name.zhi { font-size: 12px; color: #a08840; }

.hex-num-txt {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.2em;
  margin-bottom: 5px;
}
.hex-trigrams {
  font-size: 10px;
  color: #6878b0;
  line-height: 1.9;
  letter-spacing: 0.05em;
}

/* タグ */
.res-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-top: 18px;
}
.r-tag {
  border: 1px solid rgba(212,170,80,0.25);
  padding: 4px 12px;
  font-size: 10px;
  color: var(--gold-dim);
  border-radius: 20px;
  letter-spacing: 0.2em;
}

/* メッセージカード */
.msg-card {
  padding: 22px 22px;
  border-left: 3px solid var(--gold);
}
.msg-label { font-size:9px; letter-spacing:0.5em; color:#b09050; margin-bottom:10px; }
.msg-main {
  font-family: 'Shippori Mincho', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.85;
  margin-bottom: 10px;
}
.msg-body { font-size:12px; color:#8898c8; line-height:2.1; }

/* フッター */
footer {
  text-align:center;
  padding: 28px 0 0;
  font-size:9px;
  color: #3848a0;
  letter-spacing:0.4em;
}

@media(max-width:480px){
  .hex-kanji { font-size:42px; }
  .hex-kanji.zhi { font-size:32px; }
  .res-lines { width:80px; }
  .res-bar-yang { width:80px; }
  .res-bar-yin { width:34px; }
  .hex-block { max-width:140px; }
}
</style>
</head>
<body>

<canvas id="waveCanvas"></canvas>

<div class="wrapper">

<header>
  <div class="taiji">☯</div>
  <div class="hd-en">GENCHI</div>
  <div class="hd-jp">玄　智　——　易占い</div>
  <div class="hd-line">ORACLE SYSTEM</div>
</header>

<div class="container">

  <div class="card q-section">
    <div class="sec-label">YOUR QUESTION — 今日の問い</div>
    <textarea class="q-input" id="qInput"
      placeholder="問いを心に定めて、ボタンを6回押してください（例：今日の流れは？）"></textarea>
  </div>

  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

  <div class="card yao-section">
    <div class="yao-title" id="yaoTitle">初爻から順に　ボタンを6回押してください</div>
    <div class="yao-display" id="yaoDisplay"></div>
    <button class="coin-btn" id="coinBtn" onclick="throwCoins()">
      <span>🪙</span>
      <span id="btnText">占断を始める</span>
      <span class="count-badge" id="cntBadge">0 / 6</span>
    </button>
  </div>

  <div class="result-wrap" id="resultWrap">
    <div class="oracle-label">ORACLE RESULT</div>

    <div class="card hex-main-card">
      <div class="hex-row" id="hexRow"></div>
      <div class="res-tags" id="resTags"></div>
    </div>

    <div class="card msg-card">
      <div class="msg-label">MESSAGE — 今日のメッセージ</div>
      <div class="msg-main" id="msgMain"></div>
      <div class="msg-body" id="msgBody"></div>
    </div>
  </div>

</div>

<footer>GENCHI 玄智 — 数千年の叡智をAIが統合する</footer>
</div>

<script>
// ===== 波紋アニメーション =====
(function(){
  const c = document.getElementById('waveCanvas');
  const ctx = c.getContext('2d');
  let W, H;
  function resize(){ W=c.width=innerWidth; H=c.height=innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  // 星
  const stars = Array.from({length:100},()=>({
    x:Math.random()*2000, y:Math.random()*2000,
    r:Math.random()*1.0+0.2, a:Math.random(),
    d:Math.random()*0.004+0.001
  }));

  // 波紋リスト
  const ripples = [];
  function addRipple(){
    ripples.push({ x:W/2, y:H*0.35, r:10, maxR:Math.max(W,H)*0.85, a:0.35, life:1 });
  }
  addRipple();
  setInterval(addRipple, 2400);

  function draw(){
    ctx.clearRect(0,0,W,H);

    // 星
    stars.forEach(s=>{
      s.a += s.d;
      if(s.a>1||s.a<0) s.d*=-1;
      if(s.x>W) s.x=0;
      ctx.beginPath();
      ctx.arc(s.x%W, s.y%H, s.r, 0, Math.PI*2);
      ctx.fillStyle=`rgba(200,215,255,${s.a*0.55})`;
      ctx.fill();
    });

    // 波紋
    for(let i=ripples.length-1;i>=0;i--){
      const rp = ripples[i];
      rp.r += 2.2;
      rp.a = 0.35*(1 - rp.r/rp.maxR);
      if(rp.a <= 0){ ripples.splice(i,1); continue; }

      // 金色の波紋
      ctx.beginPath();
      ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI*2);
      ctx.strokeStyle=`rgba(200,160,60,${rp.a*0.6})`;
      ctx.lineWidth=1;
      ctx.stroke();

      // 青の波紋（少し遅れ）
      if(rp.r > 40){
        ctx.beginPath();
        ctx.arc(rp.x, rp.y, rp.r*0.75, 0, Math.PI*2);
        ctx.strokeStyle=`rgba(80,120,200,${rp.a*0.4})`;
        ctx.lineWidth=0.7;
        ctx.stroke();
      }
    }

    requestAnimationFrame(draw);
  }
  draw();
})();

// ===== 64卦データ =====

// 八卦→爻パターン（上から：上爻・五爻・四爻）
const TRI = {
  '乾':['yang','yang','yang'],
  '兌':['yin','yang','yang'],
  '離':['yang','yin','yang'],
  '震':['yin','yin','yang'],
  '巽':['yang','yang','yin'],
  '坎':['yin','yang','yin'],
  '艮':['yang','yin','yin'],
  '坤':['yin','yin','yin'],
};

const hexMap={'乾乾':1,'坤坤':2,'坎震':3,'艮坎':4,'坎乾':5,'乾坎':6,'坤坎':7,'坎坤':8,'巽乾':9,'乾兌':10,'坤乾':11,'乾坤':12,'乾離':13,'離乾':14,'坤艮':15,'震坤':16,'兌震':17,'艮巽':18,'坤兌':19,'巽坤':20,'離震':21,'艮離':22,'艮坤':23,'坤震':24,'乾震':25,'艮乾':26,'艮震':27,'兌巽':28,'坎坎':29,'離離':30,'兌艮':31,'震巽':32,'乾艮':33,'震乾':34,'離坤':35,'坤離':36,'巽離':37,'離兌':38,'坎艮':39,'震坎':40,'艮兌':41,'巽震':42,'兌乾':43,'乾巽':44,'兌坤':45,'坤巽':46,'兌坎':47,'坎巽':48,'兌離':49,'離巽':50,'震震':51,'艮艮':52,'巽艮':53,'震兌':54,'震離':55,'離艮':56,'巽巽':57,'兌兌':58,'巽坎':59,'坎兌':60,'巽兌':61,'震艮':62,'坎離':63,'離坎':64};

const triN=['坤','艮','坎','巽','震','離','兌','乾'];
function triNum(trio){ const b=trio.map(y=>(y==='yang')?1:0); return b[0]*4+b[1]*2+b[2]; }

let yaoLines=[], currentYao=0;
const yaoNames=['初爻','二爻','三爻','四爻','五爻','上爻'];

function throwCoins(){
  if(currentYao>=6) return;
  let total=0;
  for(let i=0;i<3;i++) total+=Math.random()<0.5?3:2;
  let type;
  if(total===6) type='changing-yin';
  else if(total===7) type='yang';
  else if(total===8) type='yin';
  else type='changing-yang';
  yaoLines.push({type,value:total});
  currentYao++;
  renderYao();
  document.getElementById('progFill').style.width=(currentYao/6*100)+'%';
  if(currentYao===6){
    document.getElementById('coinBtn').classList.add('complete','disabled');
    document.getElementById('btnText').textContent='六爻が揃いました';
    document.getElementById('cntBadge').textContent='6 / 6';
    document.getElementById('yaoTitle').textContent='六爻が揃いました';
    setTimeout(showResult,500);
  } else {
    document.getElementById('btnText').textContent=`${yaoNames[currentYao]}を投げる`;
    document.getElementById('cntBadge').textContent=`${currentYao} / 6`;
    document.getElementById('yaoTitle').textContent=`${yaoNames[currentYao]}　コインを投げてください`;
  }
}

function renderYao(){
  const d=document.getElementById('yaoDisplay');
  d.innerHTML='';
  const labels={'yang':'陽','yin':'陰','changing-yang':'老陽◎','changing-yin':'老陰×'};
  const typeClass={'yang':'yang','yin':'yin','changing-yang':'changing','changing-yin':'changing'};
  
  // 上爻から表示
  [...yaoLines].reverse().forEach((y,i)=>{
    const ri=yaoLines.length-1-i;
    const row=document.createElement('div');
    row.className='yao-row';
    row.style.animationDelay=i*0.04+'s';
    
    // 爻線のHTML生成
    let lineHtml='';
    if(y.type==='yang'){
      lineHtml=`<div class="bar-yang" style="width:100%"></div>`;
    } else if(y.type==='yin'){
      lineHtml=`<div class="bar-yin"></div><div class="bar-yin"></div>`;
    } else if(y.type==='changing-yang'){
      lineHtml=`<div class="bar-changing-yang" style="width:100%"></div>`;
    } else {
      lineHtml=`<div class="bar-changing-yin"></div><div class="bar-changing-yin"></div>`;
    }
    
    row.innerHTML=`
      <div class="yr-num">${yaoNames[ri]}</div>
      <div class="yr-lines">${lineHtml}</div>
      <div class="yr-val">${y.value}</div>
      <div class="yr-type ${typeClass[y.type]}">${labels[y.type]}</div>
    `;
    d.appendChild(row);
  });
}

function calcHexNum(lines){
  // lines は初爻(0)〜上爻(5)の配列
  // 下卦：lines[0,1,2]、上卦：lines[3,4,5]
  const lTypes=lines.slice(0,3).map(y=>(y.type==='yang'||y.type==='changing-yang')?'yang':'yin');
  const uTypes=lines.slice(3,6).map(y=>(y.type==='yang'||y.type==='changing-yang')?'yang':'yin');
  const lN=triN[triNum(lTypes)];
  const uN=triN[triNum(uTypes)];
  return hexMap[uN+lN]||1;
}

function buildResLines(upper, lower){
  // 上卦3爻 + 下卦3爻 → 上から順（上爻→初爻）
  const uL=TRI[upper]||['yin','yin','yin'];
  const lL=TRI[lower]||['yin','yin','yin'];
  return [...uL, ...lL];
}

function makeResLinesHtml(lineTypes){
  let h='<div class="res-lines">';
  lineTypes.forEach(t=>{
    if(t==='yang'){
      h+=`<div class="res-line"><div class="res-bar-yang"></div></div>`;
    } else {
      h+=`<div class="res-line"><div class="res-bar-yin"></div><div class="res-bar-yin"></div></div>`;
    }
  });
  h+='</div>';
  return h;
}

function showResult(){
  const hexNum=calcHexNum(yaoLines);
  const hex=HEX[hexNum]||HEX[1];
  const hasChange=yaoLines.some(y=>y.type==='changing-yang'||y.type==='changing-yin');

  const mainLines=buildResLines(hex.u,hex.l);
  
  let gridHtml='';
  
  if(hasChange){
    const zhiLines=yaoLines.map(y=>{
      if(y.type==='changing-yang') return{...y,type:'yin'};
      if(y.type==='changing-yin') return{...y,type:'yang'};
      return y;
    });
    const zhiNum=calcHexNum(zhiLines);
    const zhi=HEX[zhiNum]||HEX[1];
    const zhiMainLines=buildResLines(zhi.u,zhi.l);
    
    gridHtml=`
      <div class="hex-block">
        ${makeResLinesHtml(mainLines)}
        <div class="hex-kanji">${hex.k}</div>
        <div class="hex-name">${hex.n}</div>
        <div class="hex-num-txt">第${hexNum}卦・${hex.r}</div>
        <div class="hex-trigrams">上卦 ${hex.u}（${hex.u}）<br>下卦 ${hex.l}（${hex.l}）</div>
      </div>
      <div class="hex-arrow">→</div>
      <div class="hex-block">
        ${makeResLinesHtml(zhiMainLines)}
        <div class="hex-kanji zhi">${zhi.k}</div>
        <div class="hex-name zhi">${zhi.n}</div>
        <div class="hex-num-txt">之卦 第${zhiNum}卦</div>
      </div>
    `;
  } else {
    gridHtml=`
      <div></div>
      <div class="hex-block">
        ${makeResLinesHtml(mainLines)}
        <div class="hex-kanji">${hex.k}</div>
        <div class="hex-name">${hex.n}</div>
        <div class="hex-num-txt">第${hexNum}卦・${hex.r}</div>
        <div class="hex-trigrams">上卦 ${hex.u}（${hex.u}）<br>下卦 ${hex.l}（${hex.l}）</div>
      </div>
      <div></div>
    `;
  }
  
  document.getElementById('hexRow').innerHTML=gridHtml;
  document.getElementById('resTags').innerHTML=hex.t.map(t=>`<span class="r-tag">${t}</span>`).join('');
  document.getElementById('msgMain').textContent=`「${hex.m}」`;
  document.getElementById('msgBody').textContent=hex.b;
  
  const rw=document.getElementById('resultWrap');
  rw.classList.add('show');
  setTimeout(()=>rw.scrollIntoView({behavior:'smooth',block:'start'}),150);
}
</script>
</body>
</html>
